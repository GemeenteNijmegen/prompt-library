name: OpenAPI

on:
  push:
    branches:
      - main

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate OpenAPI spec
        run: python scripts/export_openapi.py
        env:
          ENVIRONMENT: production
          JWT_SECRET_KEY: ci-placeholder

      - name: Commit updated spec
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add openapi/openapi.json
          git diff --cached --quiet || git commit -m "chore: update openapi spec [skip ci]"
          git push

      - name: Build Pages site
        run: python scripts/build_pages.py

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
